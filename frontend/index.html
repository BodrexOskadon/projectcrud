<!DOCTYPE html>
<html>
<head>
<title>User Management</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.container{
max-width:900px;
margin:auto;
}

.form-box{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:40px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
background:#6366f1;
color:white;
cursor:pointer;
}

button:hover{
background:#4f46e5;
}

.user-list{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
margin-bottom:10px;
}

.photo{
width:100%;
margin-top:10px;
border-radius:8px;
}

.edit{
background:#f59e0b;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>User Management</h1>

<div class="form-box">

<h3>Tambah / Update User</h3>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input type="file" id="photo">

<button onclick="saveUser()">Save</button>

</div>

<div class="user-list" id="users"></div>

</div>

<script>

const API = "http://10.246.122.173:8080"

let editId = null

async function loadUsers(){

const res = await fetch(API + "/users")
const data = await res.json()

const container = document.getElementById("users")
container.innerHTML=""

data.forEach(u=>{

let avatar = "https://api.dicebear.com/7.x/initials/svg?seed="+u.name

let photo = u.photo ? u.photo : ""

let card = document.createElement("div")
card.className="card"

card.innerHTML=`

<img class="avatar" src="${avatar}">

<h3>${u.name}</h3>

<p>${u.email}</p>

${photo ? `<img class="photo" src="${photo}">` : ""}

<button class="edit" onclick="editUser(${u.id},'${u.name}','${u.email}')">
Edit
</button>

`

container.appendChild(card)

})

}

function editUser(id,name,email){

document.getElementById("name").value=name
document.getElementById("email").value=email

editId=id

}

async function saveUser(){

const name=document.getElementById("name").value
const email=document.getElementById("email").value
const photo=document.getElementById("photo").files[0]

if(!name || !email){
alert("Name dan Email wajib diisi")
return
}

if(photo && photo.size > 5*1024*1024){
alert("File maksimal 5MB")
return
}

let form=new FormData()

form.append("name",name)
form.append("email",email)

if(photo){
form.append("photo",photo)
}

let url=API+"/users"
let method="POST"

if(editId){
url=API+"/users/"+editId
method="PUT"
}

let res = await fetch(url,{
method:method,
body:form
})

if(!res.ok){
alert("Upload gagal")
return
}

document.getElementById("name").value=""
document.getElementById("email").value=""
document.getElementById("photo").value=""

editId=null

loadUsers()

}

loadUsers()

</script>

</body>
</html>
